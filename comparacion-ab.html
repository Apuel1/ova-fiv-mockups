<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVA · Comparación A vs B — indicadores + cards (canónico)</title>
<!--
  ARCHIVO CANÓNICO de la comparación de períodos A vs B (Fase 2).
  Consolida lo que antes eran 3 mockups sueltos (indicadores-comparacion-v1, card-comparacion-variantes,
  card-icono-altura-variantes). Acá viven: los INDICADORES de barras (azul A / rojo B) y las 4 variantes
  de CARD de totales (estilo elegido + 3 alternativas). Toggle "Comparar" arriba a la derecha.
  Concepto fijo de la card (aprobado): delta % AL LADO del número · valor anterior A LA ALTURA del ícono.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
:root{--primary:#006C9D;--cyan:#19A7C9;--deep:#0D2B35;--muted:#5B7480;--line:#D7E3E8;--orange:#EE3623;--ph:#9BB0B8;--bg:#eef3f7;--up:#0E9F6E;--ease:cubic-bezier(.3,.85,.3,1);}
*{box-sizing:border-box;font-family:'Poppins','Segoe UI',system-ui,sans-serif;}
body{margin:0;background:linear-gradient(160deg,#e7f0f5,var(--bg));color:var(--deep);padding:24px 20px 60px;}
.wrap{max-width:1180px;margin:0 auto;}
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
h1{font-size:18px;margin:0;letter-spacing:-.4px;}
.lead{color:var(--muted);font-size:12.5px;margin:0 0 4px;flex:1;min-width:240px;line-height:1.5;}
.tog{display:inline-flex;align-items:center;gap:10px;padding:9px 14px;border-radius:13px;border:1px solid var(--line);background:#fff;cursor:pointer;box-shadow:0 6px 16px rgba(13,43,53,.08);font-size:12.5px;font-weight:700;}
.tog .sw{width:40px;height:23px;border-radius:20px;background:#cdd9df;position:relative;transition:background .22s;flex:0 0 auto;}
.tog .sw::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .22s;}
.tog.on .sw{background:linear-gradient(135deg,var(--primary),var(--cyan));}
.tog.on .sw::after{transform:translateX(17px);}
.tog .dotA{width:9px;height:9px;border-radius:50%;background:var(--primary);}
.tog .dotB{width:9px;height:9px;border-radius:50%;background:var(--orange);}
.sect{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--primary);display:flex;align-items:center;gap:10px;margin:26px 0 13px;}
.sect::after{content:"";flex:1;height:1px;background:var(--line);}

/* ===== indicadores (barras A vs B) ===== */
.indic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;}
.card{background:linear-gradient(160deg,#fff,#f6fbfd);border:1px solid var(--line);border-radius:18px;padding:16px 17px 14px;box-shadow:0 12px 30px rgba(13,43,53,.07);}
.ch{display:flex;align-items:flex-start;gap:11px;margin-bottom:6px;}
.ch .ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--primary),var(--cyan));}
.ch .ic svg{width:18px;height:18px;}
.ch .tt{font-size:13.5px;font-weight:800;line-height:1.15;}
.ch .ds{font-size:10.5px;color:var(--muted);}
.ch .big{margin-left:auto;text-align:right;line-height:1;}
.ch .big .n{font-size:26px;font-weight:800;letter-spacing:-1px;}
.ch .big .lab{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:800;border-radius:30px;padding:2px 8px;margin-top:5px;}
.delta.up{color:var(--up);background:rgba(14,159,110,.1);}
.delta.down{color:var(--orange);background:rgba(238,54,35,.1);}
.delta svg{width:11px;height:11px;}
.delta .vs{font-weight:600;opacity:.7;font-size:9.5px;margin-left:2px;}
.plot{margin-top:12px;height:150px;position:relative;border-bottom:1.5px solid var(--line);}
.gl{position:absolute;left:0;right:0;border-top:1px dashed rgba(0,108,157,.1);}
.avg{position:absolute;left:0;right:0;border-top:1.5px dashed var(--orange);opacity:.55;}
.avg b{position:absolute;right:0;top:-8px;font-size:8.5px;font-weight:800;color:var(--orange);background:var(--bg);padding:0 3px;}
.bars{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-around;gap:3px;padding:0 4px;}
.slot{flex:1;height:100%;display:flex;align-items:flex-end;justify-content:center;gap:3px;min-width:0;}
.bar{width:46%;max-width:26px;border-radius:6px 6px 0 0;position:relative;transition:height .7s var(--ease);}
.bar.a{background:linear-gradient(180deg,var(--cyan),var(--primary));}
.bar.b{background:linear-gradient(180deg,#ff7a5c,var(--orange));}
.slot:not(.cmp) .bar.b{display:none;}
.slot.cmp .bar{max-width:17px;}
.bar .vv{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;white-space:nowrap;}
.bar.a .vv{color:var(--primary);}.bar.b .vv{color:var(--orange);}
.xlabels{display:flex;justify-content:space-around;gap:3px;padding:6px 4px 0;}
.xlabels .x{flex:1;text-align:center;font-size:9px;color:var(--muted);min-width:0;}
.xlabels .x small{display:block;font-size:8px;color:var(--orange);font-weight:600;}
.xlabels .x small.hide{display:none;}

/* ===== cards de totales — 4 estilos ===== */
.style-block{margin-bottom:8px;}
.style-h{display:flex;align-items:center;gap:9px;margin:18px 0 11px;}
.style-h .n{width:23px;height:23px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:11px;background:linear-gradient(135deg,var(--primary),var(--cyan));flex:0 0 auto;}
.style-h.pick .n{background:linear-gradient(135deg,var(--up),#34c98c);}
.style-h .t{font-size:12.5px;font-weight:800;}
.style-h .t small{font-weight:500;color:var(--muted);font-size:11px;margin-left:6px;}
.pair{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;max-width:600px;}
.tot{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 17px;box-shadow:0 12px 30px rgba(13,43,53,.07);}
.tot .irow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:13px;min-height:42px;}
.tot .tic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--primary),var(--cyan));flex:0 0 auto;}
.tot .tic svg{width:22px;height:22px;}
.tot .row{display:flex;align-items:baseline;gap:9px;}
.tot .num{font-size:30px;font-weight:800;letter-spacing:-1.2px;line-height:1;}
.tot .lab{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-top:9px;}
.tot .sub{font-size:10.5px;color:var(--ph);margin-top:2px;}
/* prev · estilo elegido (cA) y Alt 1 (cB): valor + rótulo */
.prev{text-align:right;line-height:1;}
.prev .pv{font-size:19px;font-weight:700;color:var(--deep);letter-spacing:-.5px;}
.prev .pc{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ph);margin-top:4px;}
.prev .pc.top{margin-top:0;margin-bottom:4px;}
/* Alt 2 (cC): chip con ícono */
.chip{display:inline-flex;align-items:center;gap:5px;background:#eef4f7;border:1px solid var(--line);border-radius:30px;padding:5px 11px;font-size:13.5px;font-weight:700;color:var(--deep);letter-spacing:-.3px;}
.chip svg{width:12px;height:12px;color:var(--muted);flex:0 0 auto;}
.chip .pc{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ph);}
/* Alt 3 (cD): mini-comparador A vs B */
.cmp2{display:flex;align-items:center;gap:9px;}
.cmp2 .bars2{display:flex;align-items:flex-end;gap:3px;height:26px;}
.cmp2 .bars2 i{width:8px;border-radius:3px 3px 0 0;}
.cmp2 .bars2 i.a{background:linear-gradient(180deg,var(--cyan),var(--primary));}
.cmp2 .bars2 i.b{background:linear-gradient(180deg,#ff7a5c,var(--orange));}
.cmp2 .pv2{text-align:right;line-height:1;}
.cmp2 .pv2 b{font-size:16px;font-weight:700;color:var(--deep);letter-spacing:-.4px;}
.cmp2 .pv2 span{display:block;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ph);margin-top:3px;}
@media(prefers-reduced-motion:reduce){.bar{transition:none;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="flex:1;min-width:240px"><h1>Comparación A vs B</h1><p class="lead">Azul = <b style="color:var(--primary)">actual (A)</b> · Rojo = <b style="color:var(--orange)">comparado (B)</b>. Concepto de card: <b>delta al lado del número</b> + <b>anterior a la altura del ícono</b>. Tocá "Comparar".</p></div>
    <div class="tog" id="tog"><span class="dotA"></span><span class="sw"></span><span class="dotB"></span>Comparar A vs B</div>
  </div>

  <div class="sect">Indicadores por período</div>
  <div class="indic-grid" id="indics"></div>

  <div class="sect">Cards de totales · 4 estilos del concepto</div>
  <div id="styles"></div>
</div>

<script>
function fmt(n){return n.toLocaleString('es-CO');}
function arrow(up){return up
  ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>'
  :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>';}
function delta(a,b,suf){var d=b===0?0:Math.round((a-b)/b*100);var up=d>=0;
  return '<span class="delta '+(up?'up':'down')+'">'+arrow(up)+Math.abs(d)+'%'+(suf===null?'':'<span class="vs">'+(suf||'vs B')+'</span>')+'</span>';}
var CLOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

/* ---- indicadores ---- */
var MESES=['Ene','Feb','Mar','Abr','May','Jun'], MESESB=['Jul','Ago','Sep','Oct','Nov','Dic'];
var INDIC=[
  {tt:'Oocitos cultivables %',ds:'Cultivados (CIV) ÷ viables (MIV)',unit:'%',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>',A:[92,95,94,90,93,94],B:[88,86,90,84,88,87]},
  {tt:'Oocitos viables / donante',ds:'Viables (MIV) ÷ donadoras',unit:'',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="9" cy="10" r="1.3" fill="currentColor" stroke="none"/></svg>',A:[28,22,22,24,26,30],B:[24,20,19,21,23,22]}
];
function renderIndics(cmp){
  var box=document.getElementById('indics'); box.innerHTML='';
  INDIC.forEach(function(d){
    var avgA=Math.round(d.A.reduce(function(s,x){return s+x;},0)/d.A.length);
    var avgB=Math.round(d.B.reduce(function(s,x){return s+x;},0)/d.B.length);
    var maxv=Math.max.apply(null,d.A.concat(cmp?d.B:[]))*1.18, bars='', xl='';
    d.A.forEach(function(va,i){var vb=d.B[i];
      bars+='<div class="slot'+(cmp?' cmp':'')+'"><div class="bar a" style="height:'+(va/maxv*100)+'%"><span class="vv">'+va+(d.unit||'')+'</span></div>'
        +'<div class="bar b" style="height:'+(vb/maxv*100)+'%"><span class="vv">'+vb+(d.unit||'')+'</span></div></div>';
      xl+='<div class="x">'+MESES[i]+'<small class="'+(cmp?'':'hide')+'">'+MESESB[i]+'</small></div>';});
    var gl=''; for(var g=1;g<=3;g++){gl+='<div class="gl" style="bottom:'+(g/4*100)+'%"></div>';}
    box.insertAdjacentHTML('beforeend',
      '<div class="card"><div class="ch"><span class="ic">'+d.ic+'</span><div><div class="tt">'+d.tt+'</div><div class="ds">'+d.ds+'</div>'+(cmp?delta(avgA,avgB):'')+'</div>'
      +'<div class="big"><div class="n">'+avgA+(d.unit||'')+'</div><div class="lab">prom. A</div></div></div>'
      +'<div class="plot">'+gl+'<div class="avg" style="bottom:'+(avgA/maxv*100)+'%"><b>prom '+avgA+(d.unit||'')+'</b></div><div class="bars">'+bars+'</div></div>'
      +'<div class="xlabels">'+xl+'</div></div>');
  });
}

/* ---- cards · 4 estilos ---- */
var DATA=[
  {ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="9" cy="10" r="1.3" fill="currentColor" stroke="none"/></svg>',lab:'Embriones totales',sub:'Empacados + congelados',A:486,B:402},
  {ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>',lab:'Oocitos totales',sub:'Madurados (MIV)',A:19316,B:20880}
];
var STYLES=[
  {key:'cB',pick:true,nm:'Estilo elegido · Rótulo arriba',ds:'eyebrow “período ant.” sobre el valor'},
  {key:'cA',nm:'Alt · valor + anterior debajo',ds:'descartado'},
  {key:'cC',nm:'Alt 2 · Chip con ícono',ds:'el anterior como tag suave'},
  {key:'cD',nm:'Alt 3 · Mini-comparador',ds:'dos barritas A vs B + valor'}
];
function prevHTML(style,d){
  if(style==='cA') return '<div class="prev"><div class="pv">'+fmt(d.B)+'</div><div class="pc">anterior</div></div>';
  if(style==='cB') return '<div class="prev"><div class="pc top">período ant.</div><div class="pv">'+fmt(d.B)+'</div></div>';
  if(style==='cC') return '<div class="chip">'+CLOCK+fmt(d.B)+'<span class="pc">ant.</span></div>';
  if(style==='cD'){var mx=Math.max(d.A,d.B);return '<div class="cmp2"><div class="bars2"><i class="a" style="height:'+(d.A/mx*26)+'px"></i><i class="b" style="height:'+(d.B/mx*26)+'px"></i></div><div class="pv2"><b>'+fmt(d.B)+'</b><span>ant.</span></div></div>';}
  return '';
}
function renderStyles(cmp){
  var box=document.getElementById('styles'); box.innerHTML='';
  STYLES.forEach(function(st){
    var cards='';
    DATA.forEach(function(d){
      cards+='<div class="tot"><div class="irow"><span class="tic">'+d.ic+'</span>'+(cmp?prevHTML(st.key,d):'')+'</div>'
        +'<div class="row"><div class="num">'+fmt(d.A)+'</div>'+(cmp?delta(d.A,d.B,null):'')+'</div>'
        +'<div class="lab">'+d.lab+'</div><div class="sub">'+d.sub+'</div></div>';
    });
    box.insertAdjacentHTML('beforeend',
      '<div class="style-block"><div class="style-h'+(st.pick?' pick':'')+'"><span class="n">'+(st.pick?'✓':STYLES.indexOf(st))+'</span><span class="t">'+st.nm+'<small>'+st.ds+'</small></span></div><div class="pair">'+cards+'</div></div>');
  });
}

var cmp=false;
function render(){renderIndics(cmp);renderStyles(cmp);}
document.getElementById('tog').addEventListener('click',function(){cmp=!cmp;this.classList.toggle('on',cmp);render();});
render();
</script>
</body>
</html>
