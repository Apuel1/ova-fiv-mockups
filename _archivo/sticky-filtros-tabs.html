<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVA · Barra sticky (tabs + filtros activos) + FAB de filtros</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
:root{--primary:#006C9D;--cyan:#19A7C9;--deep:#0D2B35;--muted:#6a8794;--line:rgba(0,108,157,.12);--orange:#EE3623;--bg1:#eef6fb;--bg2:#f7fbfd;--nav:54px;
  --dur:.44s;--ease:cubic-bezier(.22,.61,.36,1);}
*{box-sizing:border-box;font-family:'Poppins','Segoe UI',system-ui,sans-serif;}
body{margin:0;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:#1d3a44;-webkit-font-smoothing:antialiased;}

/* nav APEX simulada (fija) */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:linear-gradient(90deg,#0D2B35,#0a3f52);display:flex;align-items:center;gap:14px;padding:0 22px;z-index:100;color:#fff;box-shadow:0 2px 10px rgba(13,43,53,.2);}
.topnav .burger{width:22px;height:2px;background:#fff;position:relative;}
.topnav .burger::before,.topnav .burger::after{content:"";position:absolute;left:0;width:22px;height:2px;background:#fff;}
.topnav .burger::before{top:-6px;}.topnav .burger::after{top:6px;}
.topnav b{font-size:14px;font-weight:700;letter-spacing:.3px;}
.topnav .user{margin-left:auto;font-size:12.5px;opacity:.85;}

.page{max-width:1180px;margin:0 auto;padding:0 22px;padding-top:var(--nav);}

/* logo (scrollea) */
.brand{display:flex;align-items:center;gap:14px;padding:20px 4px 14px;}
.brand .iso{width:42px;height:42px;border-radius:10px;background:radial-gradient(circle at 35% 30%,var(--cyan),var(--primary));}
.brand .name{font-size:26px;font-weight:900;letter-spacing:-1px;color:var(--deep);}
.brand .fiv{font-size:11px;font-weight:800;color:#fff;background:var(--deep);border-radius:6px;padding:2px 7px;align-self:center;}

/* ===== BARRA STICKY: tabs + chips en UNA tarjeta unificada (se pega al scrollear) ===== */
.bar{position:sticky;top:var(--nav);z-index:60;padding:12px 0 16px;
  background:linear-gradient(180deg,var(--bg1) 66%,rgba(238,246,251,0));
  transition:padding var(--dur) var(--ease);}
/* la tarjeta: tabs arriba + footer de filtros activos abajo, redondeada en las 4 esquinas */
.bar-inner{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 14px 32px rgba(13,43,53,.09);overflow:hidden;transition:box-shadow var(--dur) var(--ease);}
.bar.stuck .bar-inner{box-shadow:0 18px 40px rgba(13,43,53,.15);}

.tabs{display:flex;gap:10px;padding:8px;min-width:0;}
.tab{flex:1;min-width:0;display:flex;align-items:center;gap:13px;padding:14px 18px;border-radius:14px;cursor:pointer;transition:background .2s,box-shadow .2s;}
.tab .ic{width:44px;height:44px;border-radius:12px;background:rgba(0,108,157,.08);color:var(--primary);display:grid;place-items:center;flex:0 0 auto;}
.tab .ic svg{width:22px;height:22px;}
.tab .tx{display:flex;flex-direction:column;min-width:0;}
.tab .tt{font-size:15px;font-weight:800;color:var(--deep);white-space:nowrap;}
.tab .ds{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;}
.tab.on{background:linear-gradient(135deg,var(--primary),var(--cyan));box-shadow:0 10px 24px rgba(0,108,157,.3);}
.tab.on .ic{background:rgba(255,255,255,.2);color:#fff;}
.tab.on .tt{color:#fff;}.tab.on .ds{color:rgba(255,255,255,.82);}
.tab:not(.on):hover{background:#f1f8fc;}

/* footer de la tarjeta: filtros activos (Campo · Valor), zona diferenciada + divisor */
.chips{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:11px 15px 13px;border-top:1px solid var(--line);background:linear-gradient(180deg,#f7fbfd,#eef5fa);}
.chips .lead{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);flex:0 0 auto;}
.chips .lead svg{width:14px;height:14px;flex:0 0 auto;}
.chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:6px 7px 6px 12px;white-space:nowrap;box-shadow:0 2px 8px rgba(13,43,53,.05);animation:chipIn .25s var(--ease);}
.chip::before{content:"";flex:0 0 auto;width:7px;height:7px;border-radius:999px;background:linear-gradient(135deg,var(--cyan),var(--primary));}
.chip .ck{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.chip .cv{font-size:13px;font-weight:700;color:var(--deep);}
.chip .x{display:grid;place-items:center;width:19px;height:19px;border-radius:7px;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;line-height:1;transition:background .18s,color .18s,transform .18s;}
.chip .x:hover{background:var(--orange);color:#fff;transform:rotate(90deg);}
.chips .clear{margin-left:2px;font-size:12px;font-weight:700;color:var(--muted);background:transparent;border:0;cursor:pointer;padding:6px 8px;border-radius:8px;transition:color .18s,background .18s;}
.chips .clear:hover{color:var(--orange);background:rgba(238,54,35,.07);}
@keyframes chipIn{from{opacity:0;transform:translateY(-4px) scale(.96);}to{opacity:1;transform:none;}}
/* estado sin filtros: informa "estás viendo todo" (no es un vacío, es vista completa) */
.chips .empty-state{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);padding:4px 2px;}
.chips .empty-state svg{width:16px;height:16px;color:var(--cyan);opacity:.85;flex:0 0 auto;}
.chips .empty-state b{color:var(--deep);font-weight:700;}

/* ===== FAB · botón Filtros flotante abajo-derecha (siempre a mano) ===== */
.fab{position:fixed;bottom:24px;right:24px;z-index:90;display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--cyan));border:0;border-radius:999px;padding:15px 22px;cursor:pointer;box-shadow:0 16px 34px rgba(0,108,157,.4);transition:transform .2s var(--ease),box-shadow .2s var(--ease);}
.fab:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(0,108,157,.46);}
.fab:active{transform:translateY(0) scale(.98);}
.fab svg{width:18px;height:18px;}
.fab .cnt{font-size:11px;font-weight:800;background:rgba(255,255,255,.25);border-radius:999px;padding:2px 8px;min-width:20px;text-align:center;}

/* foco accesible de marca (reemplaza el recuadro negro del navegador) */
.tab:focus,.chip .x:focus,.chips .clear:focus,.fab:focus{outline:none;}
.tab:focus-visible,.chip .x:focus-visible,.chips .clear:focus-visible,.fab:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;}

/* responsive */
@media(max-width:700px){
  .tab{padding:10px 12px;gap:9px;}
  .tab .ic{width:36px;height:36px;}
  .tab .ds{display:none;}
  .fab{bottom:18px;right:18px;padding:14px 20px;}
}

/* respeta el sistema: sin animaciones si el usuario las apagó */
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

/* contenido (para scrollear) */
.seclabel{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);margin:22px 4px 14px;display:flex;align-items:center;gap:10px;}
.seclabel::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{height:230px;border-radius:18px;background:linear-gradient(160deg,#fff,#eef5fa);border:1px solid var(--line);position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--cyan));}
.card::after{content:attr(data-t);position:absolute;inset:0;display:grid;place-items:center;color:#b9cdd8;font-size:14px;font-weight:700;}
.foot{height:140px;}
</style>
</head>
<body>
<div class="topnav"><span class="burger"></span><b>ova DATA</b><span class="user">juancamilobenjumea ▾</span></div>

<div class="page">
  <div class="brand"><span class="iso"></span><span class="name">ova</span><span class="fiv">FIV</span></div>

  <div class="bar" id="bar">
    <div class="bar-inner">
      <div class="tabs" id="tabs">
        <div class="tab on"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></span><span class="tx"><span class="tt">Período</span><span class="ds">Indicadores y evolución</span></span></div>
        <div class="tab"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4M17 3l4 4-9 9-5 1 1-5z"/><path d="M9 11l-6 6a2 2 0 1 0 3 3l6-6"/></svg></span><span class="tx"><span class="tt">Aspirador</span><span class="ds">Eficiencia por operador</span></span></div>
        <div class="tab"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c2 0 3 1 4 3M20 5c-2 0-3 1-4 3"/><path d="M5 8a7 7 0 0 0 14 0"/></svg></span><span class="tx"><span class="tt">Toro</span><span class="ds">Rendimiento por semental</span></span></div>
        <div class="tab"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg></span><span class="tx"><span class="tt">Ganaderías</span><span class="ds">Ranking y comparación</span></span></div>
      </div>
      <div class="chips" id="chips"><!-- generado por JS --></div>
    </div>
  </div>

  <div class="seclabel">Evolución del aspirador · todos los aspiradores</div>
  <div class="grid"><div class="card" data-t="gráfico"></div><div class="card" data-t="gráfico"></div></div>
  <div class="seclabel">Promedios del aspirador</div>
  <div class="grid"><div class="card" data-t="gráfico"></div><div class="card" data-t="gráfico"></div></div>
  <div class="seclabel">Ranking de aspiradores</div>
  <div class="grid"><div class="card" data-t="tabla" style="grid-column:1/-1"></div></div>
  <div class="seclabel">Más contenido</div>
  <div class="grid"><div class="card" data-t="gráfico"></div><div class="card" data-t="gráfico"></div></div>
  <div class="foot"></div>
</div>

<button class="fab" id="fab" title="Abrir filtros"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M6 12h12M10 19h4"/></svg>Filtros<span class="cnt">3</span></button>

<script>
/* ====== CHIPS de filtros activos (Campo · Valor) — demo funcional ====== */
var FILTERS=[
  {k:'Ganadería', v:'La Esperanza'},
  {k:'Período', v:'Último trimestre'},
  {k:'Raza donante', v:'Brahman'}
];
var FUNNEL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h18l-7 8v6l-4 2v-8z"/></svg>';
var LAYERS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7l9 5 9-5-9-5z"/><path d="m3 12 9 5 9-5M3 17l9 5 9-5"/></svg>';
function renderChips(){
  var box=document.getElementById('chips');
  if(!FILTERS.length){
    box.innerHTML='<span class="empty-state">'+LAYERS+'Mostrando <b>todos los datos</b></span>';
  }else{
    var lead='<span class="lead">'+FUNNEL+'Activos</span>';
    box.innerHTML=lead+FILTERS.map(function(f,i){
      return '<span class="chip"><span class="ck">'+f.k+'</span><span class="cv">'+f.v+'</span>'+
             '<button class="x" type="button" data-i="'+i+'" title="Quitar filtro">&#10005;</button></span>';
    }).join('')+'<button class="clear" type="button">Limpiar todo</button>';
  }
  var n=FILTERS.length;
  var cnt=document.querySelector('.fab .cnt');
  cnt.textContent=n; cnt.style.display=n?'':'none';
  Array.prototype.forEach.call(box.querySelectorAll('.x'),function(b){
    b.addEventListener('click',function(){ FILTERS.splice(+b.dataset.i,1); renderChips(); });
  });
  var clr=box.querySelector('.clear');
  if(clr) clr.addEventListener('click',function(){ FILTERS=[]; renderChips(); });
}
renderChips();

/* ====== sticky → sombra al pegarse (sentinel + IntersectionObserver) ====== */
var bar=document.getElementById('bar');
var sent=document.createElement('div'); sent.style.cssText='height:1px;'; bar.parentNode.insertBefore(sent,bar);
var nav=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav'))||54;
new IntersectionObserver(function(es){
  bar.classList.toggle('stuck', !es[0].isIntersecting);
},{rootMargin:'-'+(nav+1)+'px 0px 0px 0px',threshold:0}).observe(sent);

/* ====== FAB filtros: feedback al abrir (en producción dispara el drawer) ====== */
document.getElementById('fab').addEventListener('click',function(){
  this.animate([{transform:'scale(1)'},{transform:'scale(.94)'},{transform:'scale(1)'}],{duration:200,easing:'ease'});
});

/* ====== tabs demo (cambiar activo) ====== */
document.getElementById('tabs').querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){
  document.getElementById('tabs').querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');
});});
</script>
</body>
</html>
